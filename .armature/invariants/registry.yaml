    severity: critical
    status: active
    superseded-by: null
    description: "Every normalized AST must validate against the vendored limnalis_ast_schema before acceptance."
    defined-in: .armature/invariants/invariants.md
    enforced-by:
      ci:
        - tests/test_schema_validation.py
        - .github/workflows/ci.yml
      startup:
        - src/limnalis/schema.py
      runtime: []
    referenced-in:
      - .armature/invariants/invariants.md
    exceptions: []

  SCHEMA-002:
    name: "Schema Version Pinning"
    severity: critical
    status: active
    superseded-by: null
    description: "Vendored schemas must be version-pinned with version string in filename."
    defined-in: .armature/invariants/invariants.md
    enforced-by:
      ci:
        - tests/test_packaging_resources.py
      startup:
        - src/limnalis/schema.py
      runtime: []
    referenced-in:
      - .armature/invariants/invariants.md
    exceptions: []

  SCHEMA-003:
    name: "Schema Change Version Bump"
    severity: critical
    status: active
    superseded-by: null
    description: "Schema changes require version bump in pyproject.toml and updated filenames in schemas/."
    defined-in: .armature/invariants/invariants.md
    enforced-by:
      ci: []
      startup: []
      runtime: []
    referenced-in:
      - .armature/invariants/invariants.md
    exceptions: []

  SCHEMA-004:
    name: "Fixture Corpus Schema Validation"
    severity: high
    status: active
    superseded-by: null
    description: "Fixture corpus must validate against limnalis_fixture_corpus_schema."
    defined-in: .armature/invariants/invariants.md
