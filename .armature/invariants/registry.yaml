    exceptions: []

  # --- Grammar & Parser ---
  PARSER-001:
    name: "Permissive Parser Acceptance"
    severity: critical
    status: active
    superseded-by: null
    description: "The Lark grammar must accept all valid Limnalis surface syntax. Parser is permissive; normalizer enforces constraints."
