# Armature Invariant Registry
# Machine-readable registry of all hard constraints.
# Each entry maps to an enforcement mechanism and is referenced by governance files.

invariants:
  # --- Specification Governance ---
  SPEC-001:
    name: "Specification section contiguity"
    severity: critical
    status: active
    superseded-by: null
    description: "ARMATURE.md section numbering must be contiguous to prevent broken cross-references."
    defined-in: .armature/ARMATURE.md
    enforced-by:
      ci:
        - .armature/hooks/post-stop.sh
      startup: []
      runtime: []
    referenced-in:
      - .armature/invariants/invariants.md
      - .armature/agents.md
    exceptions: []

  SPEC-002:
    name: "Specification internal references"
    severity: critical
    status: active
    superseded-by: null
    description: "All internal section references in ARMATURE.md must resolve to prevent dead links."
    defined-in: .armature/ARMATURE.md
    enforced-by:
      ci:
        - .armature/hooks/post-stop.sh
      startup: []
      runtime: []
    referenced-in:
      - .armature/invariants/invariants.md
      - .armature/agents.md
      - .claude/commands/agents.md
      - .claude/agents/agents.md
    exceptions: []

  # --- Schema Governance ---
  SCHEMA-001:
